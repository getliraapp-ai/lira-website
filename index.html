<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LIRA</title>

  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(135deg,#6C63FF,#8E2DE2,#FF6FD8);
      min-height:100vh;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    .container{
      width:90%;
      max-width:700px;
      background:rgba(255,255,255,0.12);
      padding:40px;
      border-radius:25px;
      backdrop-filter:blur(10px);
      box-shadow:0 10px 40px rgba(0,0,0,0.3);
    }

    img{
      width:160px;
      margin-bottom:20px;
    }

    h1{
      font-size:56px;
      margin-bottom:10px;
    }

    p{
      font-size:20px;
      line-height:1.6;
      opacity:0.95;
    }

    .btn{
      display:inline-block;
      margin-top:30px;
      padding:15px 35px;
      border-radius:50px;
      background:white;
      color:#6C63FF;
      text-decoration:none;
      font-weight:bold;
      font-size:18px;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.05);
    }
  </style>
</head>

<body>

<div class="container">

<img src="logo.png" alt="LIRA Logo">

<h1>LIRA</h1>

<p>
Yapay zeka destekli özel gün ve hediye asistanı.
</p>

<p>
Sevdiklerinizi unutmayın, doğru hediyeyi yapay zeka ile bulun.
</p>

<a class="btn" href="#">
Yakında Başlıyor
</a>

</div>

</body>
</html>
